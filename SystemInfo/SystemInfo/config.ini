; ============================================
; КОНФИГУРАЦИЯ СЛУЖБЫ СБОРА ИНФОРМАЦИИ О СИСТЕМЕ
; ============================================
;
; Этот файл содержит настройки для службы мониторинга.
; Измените значения ниже и перезапустите службу.
;
; ВАЖНО: Все значения чувствительны к регистру!
; ============================================

; ###########################################
; ОСНОВНЫЕ НАСТРОЙКИ СКАНИРОВАНИЯ
; ###########################################

; Период сканирования в минутах
; Минимальное значение: 1 минута
; Максимальное значение: 43200 минут (30 дней)
; Пример: 60 = 1 час, 180 = 3 часа, 1440 = 24 часа
ScanIntervalMinutes=60

; Выполнять сканирование при запуске службы
; true - да, false - нет
ScanOnStartup=true

; Уровень детализации логов
; Возможные значения: Minimal, Normal, Verbose
; Minimal - только ошибки и основные события
; Normal - стандартный уровень (рекомендуется)
; Verbose - подробные логи для отладки
LogLevel=Verbose

; ============================================
; НАСТРОЙКИ ПОДКЛЮЧЕНИЯ К БАЗЕ ДАННЫХ MYSQL
; ============================================
;
; ПРЕДУПРЕЖДЕНИЕ: База данных должна быть создана заранее!
; Используйте MySQL Workbench для создания базы данных.
; ============================================

; Адрес сервера MySQL
; localhost - если MySQL на этом же компьютере
; 192.168.1.100 - если на другом компьютере в сети
MySQLServer=localhost

; Имя базы данных для хранения информации
; База должна быть создана заранее!
MySQLDatabase=sysinf

; Имя пользователя MySQL
; root - пользователь по умолчанию
; или создайте отдельного пользователя для безопасности
MySQLUserId=root

; Пароль пользователя MySQL
; Оставьте пустым, если пароль не установлен
; ЗАМЕНИТЕ 'your_password' на реальный пароль!
MySQLPassword=Ss159753sS+//+SQL